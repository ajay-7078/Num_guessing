<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Number Guessing Game</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<script defer src="script4.js"></script>
</head>
<body>

<div class="game-wrap" id="gameWrap">
  <!-- Header -->
  <div class="game-header">
    <div class="badge"><span></span>Mini Game</div>
    <h1>Guess the Number</h1>
    <p class="subtitle">Pick a number between <strong>1 – 100</strong>.<br/>You have <strong>10 attempts</strong> to crack it.</p>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Attempts Left</div>
      <div class="stat-value accent" id="remaining">10</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Guesses</div>
      <div class="stat-value" id="totalGuesses">0</div>
    </div>
  </div>

  <!-- Attempt dots -->
  <div class="attempt-dots" id="attemptDots"></div>

  <!-- Input -->
  <div class="input-group">
    <input type="number" id="guessField" class="guess-input" placeholder="Enter guess…" min="1" max="100"/>
    <button class="submit-btn" id="submitBtn">Submit</button>
  </div>

  <!-- Message -->
  <div class="message-box" id="messageBox">Make your first guess above! 🎯</div>

  <!-- Previous guesses -->
  <div class="guesses-section">
    <div class="guesses-label">Previous Guesses</div>
    <div class="guesses-pills" id="guessPills"><span style="color:var(--muted);font-size:13px">None yet</span></div>
  </div>

  <!-- New game -->
  <button class="new-game-btn" id="newGameBtn">🔄 Play Again</button>
</div>


</body>
</html>
